<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Collection Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; }
        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2.5rem 0;
            margin-bottom: 2rem;
        }
        .card { border: none; box-shadow: 0 2px 12px rgba(0,0,0,0.08); border-radius: 12px; }
        .table th { border-top: none; }
        .btn-action { padding: 0.25rem 0.5rem; font-size: 0.85rem; }
        #bookForm .form-control:focus { border-color: #667eea; box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.25); }
        .toast-container { z-index: 1080; }
        .empty-state { padding: 3rem 1rem; text-align: center; color: #888; }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; display: block; }
    </style>
</head>
<body>

<!-- Hero Header -->
<div class="hero">
    <div class="container">
        <h1 class="mb-1"><i class="bi bi-book"></i> Book Collection Manager</h1>
        <p class="mb-0 opacity-75">Manage your personal library</p>
    </div>
</div>

<div class="container mb-5">
    <div class="row g-4">

        <!-- Add / Edit Form -->
        <div class="col-lg-4">
            <div class="card p-4">
                <h5 id="formTitle" class="mb-3"><i class="bi bi-plus-circle"></i> Add New Book</h5>
                <form id="bookForm" novalidate>
                    <input type="hidden" id="bookId">
                    <div class="mb-3">
                        <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="title" required maxlength="200">
                        <div class="invalid-feedback">Title is required.</div>
                    </div>
                    <div class="mb-3">
                        <label for="author" class="form-label">Author <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="author" required maxlength="200">
                        <div class="invalid-feedback">Author is required.</div>
                    </div>
                    <div class="mb-3">
                        <label for="genre" class="form-label">Genre</label>
                        <input type="text" class="form-control" id="genre" maxlength="100">
                    </div>
                    <div class="mb-3">
                        <label for="year" class="form-label">Year</label>
                        <input type="number" class="form-control" id="year" min="0" max="9999">
                        <div class="invalid-feedback">Year must be between 0 and 9999.</div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            <i class="bi bi-plus-lg"></i> Add Book
                        </button>
                        <button type="button" class="btn btn-outline-secondary d-none" id="cancelBtn">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Book List -->
        <div class="col-lg-8">
            <div class="card">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0"><i class="bi bi-collection"></i> My Books</h5>
                        <span class="badge bg-primary rounded-pill" id="bookCount">0</span>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0" id="booksTable">
                            <thead class="table-light">
                                <tr>
                                    <th>#</th>
                                    <th>Title</th>
                                    <th>Author</th>
                                    <th>Genre</th>
                                    <th>Year</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="booksBody"></tbody>
                        </table>
                    </div>

                    <div class="empty-state d-none" id="emptyState">
                        <i class="bi bi-journal-x"></i>
                        <p class="mb-0">No books yet. Add your first book!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Toast Notification -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toast" class="toast" role="alert">
        <div class="toast-body d-flex align-items-center gap-2">
            <span id="toastMsg"></span>
            <button type="button" class="btn-close ms-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirm Delete</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Are you sure you want to delete <strong id="deleteBookTitle"></strong>?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API = "/api/books";
let deleteId = null;

const $ = (sel) => document.querySelector(sel);
const toast = new bootstrap.Toast($("#toast"), { delay: 3000 });
const deleteModal = new bootstrap.Modal($("#deleteModal"));

function showToast(msg, success = true) {
    const el = $("#toast");
    el.className = "toast text-bg-" + (success ? "success" : "danger");
    $("#toastMsg").textContent = msg;
    toast.show();
}

function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

async function loadBooks() {
    try {
        const res = await fetch(API);
        const books = await res.json();
        const tbody = $("#booksBody");
        const empty = $("#emptyState");
        const table = $("#booksTable");

        $("#bookCount").textContent = books.length;

        if (books.length === 0) {
            table.classList.add("d-none");
            empty.classList.remove("d-none");
            return;
        }

        table.classList.remove("d-none");
        empty.classList.add("d-none");

        tbody.innerHTML = books.map((b, i) => `
            <tr>
                <td class="text-muted">${books.length - i}</td>
                <td><strong>${escapeHtml(b.title)}</strong></td>
                <td>${escapeHtml(b.author)}</td>
                <td>${escapeHtml(b.genre || "—")}</td>
                <td>${b.year ?? "—"}</td>
                <td class="text-end">
                    <button class="btn btn-outline-primary btn-action me-1" onclick="editBook('${b.id}')" title="Edit">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-outline-danger btn-action" onclick="confirmDelete('${b.id}', '${escapeHtml(b.title).replace(/'/g, "\\'")}')" title="Delete">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>
        `).join("");
    } catch {
        showToast("Failed to load books.", false);
    }
}

function resetForm() {
    $("#bookForm").reset();
    $("#bookForm").classList.remove("was-validated");
    $("#bookId").value = "";
    $("#formTitle").innerHTML = '<i class="bi bi-plus-circle"></i> Add New Book';
    $("#submitBtn").innerHTML = '<i class="bi bi-plus-lg"></i> Add Book';
    $("#cancelBtn").classList.add("d-none");
}

$("#cancelBtn").addEventListener("click", resetForm);

$("#bookForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const form = e.target;

    // Client-side validation
    const titleVal = $("#title").value.trim();
    const authorVal = $("#author").value.trim();
    const yearVal = $("#year").value;

    let valid = true;
    if (!titleVal) { $("#title").classList.add("is-invalid"); valid = false; }
    else { $("#title").classList.remove("is-invalid"); }
    if (!authorVal) { $("#author").classList.add("is-invalid"); valid = false; }
    else { $("#author").classList.remove("is-invalid"); }
    if (yearVal && (isNaN(yearVal) || +yearVal < 0 || +yearVal > 9999)) {
        $("#year").classList.add("is-invalid"); valid = false;
    } else { $("#year").classList.remove("is-invalid"); }

    if (!valid) return;

    const body = {
        title: titleVal,
        author: authorVal,
        genre: $("#genre").value.trim(),
        year: yearVal ? +yearVal : null,
    };

    const bookId = $("#bookId").value;
    const isEdit = !!bookId;

    try {
        const res = await fetch(isEdit ? `${API}/${bookId}` : API, {
            method: isEdit ? "PUT" : "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) {
            showToast(data.error || "Something went wrong.", false);
            return;
        }
        showToast(isEdit ? "Book updated!" : "Book added!");
        resetForm();
        loadBooks();
    } catch {
        showToast("Network error.", false);
    }
});

async function editBook(id) {
    try {
        const res = await fetch(`${API}/${id}`);
        if (!res.ok) { showToast("Book not found.", false); return; }
        const b = await res.json();
        $("#bookId").value = b.id;
        $("#title").value = b.title;
        $("#author").value = b.author;
        $("#genre").value = b.genre || "";
        $("#year").value = b.year ?? "";
        $("#formTitle").innerHTML = '<i class="bi bi-pencil"></i> Edit Book';
        $("#submitBtn").innerHTML = '<i class="bi bi-check-lg"></i> Update Book';
        $("#cancelBtn").classList.remove("d-none");
        window.scrollTo({ top: 0, behavior: "smooth" });
    } catch {
        showToast("Failed to load book details.", false);
    }
}

function confirmDelete(id, title) {
    deleteId = id;
    $("#deleteBookTitle").textContent = title;
    deleteModal.show();
}

$("#confirmDeleteBtn").addEventListener("click", async () => {
    try {
        const res = await fetch(`${API}/${deleteId}`, { method: "DELETE" });
        if (!res.ok) { showToast("Failed to delete.", false); return; }
        showToast("Book deleted!");
        deleteModal.hide();
        if ($("#bookId").value == deleteId) resetForm();
        loadBooks();
    } catch {
        showToast("Network error.", false);
    }
});

// Clear validation on input
["title", "author", "year"].forEach(id => {
    $(`#${id}`).addEventListener("input", () => $(`#${id}`).classList.remove("is-invalid"));
});

loadBooks();
</script>
</body>
</html>
